<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Bluebird · Caisse</title>
  <meta name="theme-color" content="#0E1B2A" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bluebird" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 14c4-1 6-4 9-8 1 3 0 5-2 7 3 0 5-1 7-3-1 4-4 7-9 7-3 0-5-1-6-3 0 0 1 .3 1 .3z"/>
      </svg>
      <span class="brand-name">Bluebird</span>
    </div>
    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab" data-view="home" role="tab">Accueil</button>
      <button class="tab" data-view="floor" role="tab">Salle</button>
      <button class="tab" data-view="menu" role="tab">Carte</button>
      <button class="tab" data-view="catalog" role="tab">Produits</button>
      <button class="tab" data-view="dashboard" role="tab">Tableau&nbsp;de&nbsp;bord</button>
    </nav>
    <div class="topbar-actions">
      <button class="icon-btn" id="settings-btn" title="Réglages" aria-label="Réglages">⚙</button>
    </div>
  </header>

  <main id="view" class="view"></main>

  <!-- Tiroir de note (commande) -->
  <aside id="drawer" class="drawer" hidden></aside>
  <div id="scrim" class="scrim" hidden></div>

  <!-- Couche de dialogues -->
  <div id="modal-layer" class="modal-layer" hidden></div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
